name: nutriguide_mobile
description: "NutriGuide - Smart nutrition scoring & shopping assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management — Riverpod 3.x
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.0

  # Navigation
  go_router: ^14.8.0

  # HTTP
  dio: ^5.8.0

  # Local Storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  shared_preferences: ^2.5.0
  flutter_secure_storage: ^9.2.0

  # Camera / Scanner
  mobile_scanner: ^6.0.0

  # Image Picker — for avatar selection from gallery
  image_picker: ^1.1.2

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  fpdart: ^1.1.0

  # UI
  google_fonts: ^6.2.0
  cached_network_image: ^3.4.0

  # Supabase
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1

  # Utils
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^4.0.3
  hive_ce_generator: ^1.9.5
  riverpod_lint: ^3.1.3

  # Testing
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
